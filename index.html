<!DOCTYPE html><html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelForge</title>
</head>
<body><header>
    <h1>🎬 ReelForge</h1>
    <p>Create Professional Shorts & Reels</p>
</header>

<hr>

<main>

    <section>
        <h2>वीडियो अपलोड करें</h2>

        <input
            type="file"
            id="videoUpload"
            accept="video/*"
            multiple>
    </section>

    <hr>

    <section>
        <h2>अपलोड की गई क्लिप्स</h2>

        <ul id="clipList">
            <li>अभी कोई वीडियो क्लिप नहीं जोड़ी गई है।</li>
        </ul>
    </section>

    <hr>

    <section>
        <h2>रील निर्माण</h2>

        <button id="createReelBtn">
            Reel बनाएं
        </button>
    </section>

</main>

</body>
</html>
