<!DOCTYPE html>
<html lang="hi">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Shorts / Reel Creator Pro
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <!--
  ====================================================
  APP SHELL
  ====================================================
  -->

  <div class="app-shell">

    <!--
    ==================================================
    HEADER
    ==================================================
    -->

    <header class="app-header">

      <h1 class="app-title">
        Shorts / Reel Creator Pro
      </h1>

      <p class="app-subtitle">
        मोबाइल से Shorts और Reels बनाइए
      </p>

    </header>

    <!--
    ==================================================
    MAIN LAYOUT
    ==================================================
    -->

    <main class="app-main">

      <!--
      ================================================
      LEFT PANEL
      ================================================
      -->

      <section class="editor-panel">

        <div class="panel-heading">

          <h2>
            Video Scenes
          </h2>

        </div>

        <!--
        ==============================================
        SCENE CONTAINER
        ==============================================
        -->

        <div
          id="sceneContainer"
          class="scene-container"
        >

          <!--
          ============================================
          DEFAULT SCENE
          ============================================
          -->

          <article class="scene-card">

            <div class="scene-topbar">

              <div class="scene-title">
                Scene 1
              </div>

              <button
                type="button"
                class="scene-remove-btn"
              >
                Remove
              </button>

            </div>

            <!-- VIDEO -->

            <div class="scene-field">

              <label>
                Upload Video
              </label>

              <input
                type="file"
                accept="video/*"
                class="scene-video-input"
              />

            </div>

            <!-- TEXT -->

            <div class="scene-field">

              <label>
                Scene Narration
              </label>

              <textarea
                class="scene-text-input"
                placeholder="यहाँ narration लिखें..."
              ></textarea>

            </div>

            <!-- VOICE -->

            <div class="scene-field">

              <label>
                Voice
              </label>

              <select
                class="scene-voice-select"
              >

                <option value="female">
                  Indian Female
                </option>

                <option value="male">
                  Indian Male
                </option>

              </select>

            </div>

            <!-- EFFECT -->

            <div class="scene-field">

              <label>
                Effect
              </label>

              <select
                class="scene-effect-select"
              >

                <option value="none">
                  None
                </option>

                <option value="flowers">
                  Flower Rain
                </option>

                <option value="snow">
                  Snow Fall
                </option>

                <option value="rain">
                  Water Rain
                </option>

                <option value="sparkles">
                  Sparkles
                </option>

              </select>

            </div>

            <!-- PREVIEW -->

            <div class="scene-preview">

              <video
                muted
                playsinline
                preload="metadata"
              ></video>

            </div>

          </article>

        </div>

        <!--
        ==============================================
        ADD SCENE
        ==============================================
        -->

        <button
          id="addSceneBtn"
          class="primary-btn"
          type="button"
        >
          + Add Video Scene
        </button>

      </section>

      <!--
      ================================================
      RIGHT PANEL
      ================================================
      -->

      <section class="preview-panel">

        <div class="panel-heading">

          <h2>
            Reel Preview
          </h2>

        </div>

        <!--
        ==============================================
        PREVIEW WRAPPER
        ==============================================
        -->

        <div
          id="cinematicPreview"
          class="cinematic-preview"
        >

          <canvas
            id="renderCanvas"
          ></canvas>

        </div>

        <!--
        ==============================================
        GLOBAL SETTINGS
        ==============================================
        -->

        <div class="settings-card">

          <div class="setting-row">

            <label for="watermarkInput">
              Watermark
            </label>

            <input
              id="watermarkInput"
              type="text"
              placeholder="Your Brand Name"
            />

          </div>

        </div>

        <!--
        ==============================================
        PLAYBACK CONTROLS
        ==============================================
        -->

        <div class="controls">

          <button
            id="playBtn"
            class="success-btn"
            type="button"
          >
            ▶ Play Reel
          </button>

          <button
            id="stopBtn"
            class="danger-btn"
            type="button"
          >
            ⏹ Stop
          </button>

          <button
            id="exportBtn"
            class="primary-btn"
            type="button"
          >
            ⬇ Export Reel
          </button>

        </div>

      </section>

    </main>

  </div>

  <!--
  ====================================================
  JAVASCRIPT
  ====================================================
  -->

  <script src="js/video-engine.js"></script>

  <script src="js/subtitle-engine.js"></script>

  <script src="js/tts-engine.js"></script>

  <script src="js/effects-engine.js"></script>

  <script src="js/timeline-engine.js"></script>

  <script src="js/export-engine.js"></script>

  <script src="js/script.js"></script>

</body>  
</html>
